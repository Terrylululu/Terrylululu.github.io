<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>愤怒的小鸟 | 网页弹弓游戏</title>
  <meta name="description" content="一个可以直接在浏览器中游玩的愤怒小鸟风格弹弓物理小游戏。">
  <link rel="stylesheet" href="style.css">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <header class="topbar" aria-label="游戏状态栏">
    <a class="brand" href="#game" aria-label="回到游戏区域">
      <span class="brand-bird" aria-hidden="true"></span>
      <span>愤怒的小鸟</span>
    </a>

    <nav class="top-actions" aria-label="游戏操作">
      <button class="icon-button" id="resetButton" type="button" title="重开本关" aria-label="重开本关">↻</button>
      <button class="text-button" id="nextButton" type="button">下一关</button>
    </nav>
  </header>

  <main class="game-app" id="game">
    <section class="game-stage" aria-label="游戏画面">
      <canvas id="gameCanvas" width="1280" height="720" role="img" aria-label="弹弓、红色小鸟、木质堡垒和绿色目标组成的物理游戏画面"></canvas>
      <div class="status-pill" id="statusText" aria-live="polite">准备发射</div>
    </section>

    <aside class="hud" aria-label="游戏信息">
      <div class="scoreboard">
        <div>
          <span>分数</span>
          <strong id="scoreValue">0</strong>
        </div>
        <div>
          <span>关卡</span>
          <strong id="levelValue">1/3</strong>
        </div>
        <div>
          <span>小鸟</span>
          <strong id="birdsValue">3</strong>
        </div>
        <div>
          <span>目标</span>
          <strong id="pigsValue">0</strong>
        </div>
      </div>

      <div class="power-box" aria-label="蓄力">
        <span>拉力</span>
        <div class="power-track"><i id="powerFill"></i></div>
      </div>

      <div class="level-list" id="levelList" aria-label="选择关卡"></div>
    </aside>
  </main>

  <section class="bubble-overlay" id="bubbleOverlay" aria-label="过关气泡特效" aria-hidden="true">
    <div class="bubble-panel" role="dialog" aria-modal="true" aria-labelledby="bubbleTitle">
      <header class="bubble-header">
        <div>
          <span>过关特效</span>
          <strong id="bubbleTitle">鼠标气泡特效</strong>
        </div>
        <button class="bubble-close" id="bubbleCloseButton" type="button" aria-label="关闭过关气泡特效">关闭</button>
      </header>
      <iframe id="bubbleFrame" title="过关气泡特效" loading="lazy"></iframe>
    </div>
  </section>
</body>
</html>
