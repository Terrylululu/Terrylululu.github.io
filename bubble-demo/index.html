<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鼠标气泡特效</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0c0015, #1a0033, #0d001a);
            overflow: hidden;
            cursor: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1000;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        .cursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .bubble {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp var(--duration) ease-out forwards;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.3),
                        0 0 30px var(--glow-color);
            z-index: 999;
        }

        .bubble::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 30%;
            height: 30%;
            background: radial-gradient(circle, rgba(255,255,255,0.8), transparent);
            border-radius: 50%;
        }

        .bubble::after {
            content: '';
            position: absolute;
            top: 40%;
            left: 15%;
            width: 15%;
            height: 15%;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            filter: blur(1px);
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: translate(
                    calc(-50% + var(--drift-x)),
                    calc(-50% - 300px)
                ) scale(0.2);
            }
        }

        .trail {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(255,255,255,0.6), transparent);
            animation: fadeTrail 0.8s ease-out forwards;
            z-index: 998;
        }

        @keyframes fadeTrail {
            to {
                opacity: 0;
                transform: scale(0);
            }
        }

        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.08);
            font-size: 12vw;
            font-weight: 900;
            letter-spacing: 15px;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 0 100px rgba(100, 0, 255, 0.1);
        }

        .title span {
            display: inline-block;
            opacity: 0;
            animation: fadeInChar 0.5s ease forwards;
            animation-delay: var(--delay);
        }

        .title span.visible {
            opacity: 1;
        }

        @keyframes fadeInChar {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.5);
                filter: blur(10px);
            }
            50% {
                opacity: 0.8;
                filter: blur(5px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .title.glow span {
            animation: glowPulse 2s ease-in-out infinite alternate;
            animation-delay: var(--glow-delay);
        }

        @keyframes glowPulse {
            0% {
                text-shadow: 0 0 20px rgba(100, 0, 255, 0.2);
                color: rgba(255, 255, 255, 0.15);
            }
            100% {
                text-shadow: 0 0 40px rgba(100, 0, 255, 0.4),
                             0 0 80px rgba(255, 0, 150, 0.3);
                color: rgba(255, 255, 255, 0.25);
            }
        }

        .particles {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: twinkle var(--twinkle-duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <div class="title" id="title"></div>

    <script>
        // 动态显示文字
        const title = document.getElementById('title');
        const text = '我爱你';
        let charIndex = 0;

        function showNextChar() {
            if (charIndex < text.length) {
                const span = document.createElement('span');
                span.textContent = text[charIndex];
                span.style.setProperty('--delay', '0s');
                title.appendChild(span);

                // 动画结束后添加 visible 类
                setTimeout(() => {
                    span.classList.add('visible');
                }, 500);

                charIndex++;
                setTimeout(showNextChar, 800);
            } else {
                // 所有字显示完后，添加呼吸发光效果
                setTimeout(() => {
                    title.classList.add('glow');
                    const spans = title.querySelectorAll('span');
                    spans.forEach((span, i) => {
                        span.style.setProperty('--glow-delay', (i * 0.3) + 's');
                    });
                }, 600);
            }
        }

        // 延迟开始显示文字
        setTimeout(showNextChar, 500);

        // 创建自定义光标
        const cursor = document.querySelector('.cursor');

        // 创建背景粒子
        function createParticles() {
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particles';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = Math.random() * 100 + 'vh';
                particle.style.setProperty('--twinkle-duration', (2 + Math.random() * 3) + 's');
                particle.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(particle);
            }
        }
        createParticles();

        // 气泡颜色方案
        const colors = [
            { bg: 'rgba(100, 0, 255, 0.6)', glow: 'rgba(100, 0, 255, 0.4)' },
            { bg: 'rgba(0, 200, 255, 0.6)', glow: 'rgba(0, 200, 255, 0.4)' },
            { bg: 'rgba(255, 0, 150, 0.6)', glow: 'rgba(255, 0, 150, 0.4)' },
            { bg: 'rgba(0, 255, 200, 0.6)', glow: 'rgba(0, 255, 200, 0.4)' },
            { bg: 'rgba(255, 100, 0, 0.6)', glow: 'rgba(255, 100, 0, 0.4)' },
            { bg: 'rgba(255, 255, 0, 0.6)', glow: 'rgba(255, 255, 0, 0.4)' },
        ];

        // 创建气泡
        function createBubble(x, y) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            const size = 30 + Math.random() * 60;
            const color = colors[Math.floor(Math.random() * colors.length)];
            const driftX = (Math.random() - 0.5) * 200;
            const duration = 1.5 + Math.random() * 1.5;

            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = x + 'px';
            bubble.style.top = y + 'px';
            bubble.style.background = `radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), ${color.bg})`;
            bubble.style.setProperty('--glow-color', color.glow);
            bubble.style.setProperty('--drift-x', driftX + 'px');
            bubble.style.setProperty('--duration', duration + 's');

            document.body.appendChild(bubble);

            setTimeout(() => bubble.remove(), duration * 1000);
        }

        // 创建轨迹
        function createTrail(x, y) {
            const trail = document.createElement('div');
            trail.className = 'trail';
            trail.style.left = x + 'px';
            trail.style.top = y + 'px';
            document.body.appendChild(trail);
            setTimeout(() => trail.remove(), 800);
        }

        // 节流函数
        let lastBubbleTime = 0;
        let lastTrailTime = 0;

        // 鼠标移动事件
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;

            // 更新光标位置
            cursor.style.left = x + 'px';
            cursor.style.top = y + 'px';

            // 创建气泡（节流）
            const now = Date.now();
            if (now - lastBubbleTime > 50) {
                createBubble(x + (Math.random() - 0.5) * 20, y + (Math.random() - 0.5) * 20);
                lastBubbleTime = now;
            }

            // 创建轨迹
            if (now - lastTrailTime > 30) {
                createTrail(x, y);
                lastTrailTime = now;
            }
        });

        // 鼠标点击时创建大量气泡
        document.addEventListener('click', (e) => {
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    createBubble(
                        e.clientX + (Math.random() - 0.5) * 100,
                        e.clientY + (Math.random() - 0.5) * 100
                    );
                }, i * 50);
            }
        });

        // 鼠标按下时光标变化
        document.addEventListener('mousedown', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(0.8)';
        });

        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });
    </script>
</body>
</html>
