<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大模型问答</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="会话设置">
        <div class="brand-block">
          <div class="brand-mark">AI</div>
          <div>
            <h1>大模型问答</h1>
            <p id="modelName">mimo-v2.5-pro</p>
          </div>
        </div>

        <section class="settings-panel" aria-label="参数">
          <label class="field-label" for="systemPrompt">系统提示词</label>
          <textarea id="systemPrompt" class="system-input" rows="6">你是一个中文问答助手，回答要清晰、准确、直接。</textarea>

          <label class="field-label" for="temperature">创造性 <span id="temperatureValue">0.6</span></label>
          <input id="temperature" type="range" min="0" max="1" step="0.1" value="0.6" />

          <label class="field-label" for="maxTokens">最大输出</label>
          <input id="maxTokens" class="number-input" type="number" min="256" max="8192" step="256" value="2048" />
        </section>

        <button id="newChat" class="secondary-button" type="button">新建会话</button>
      </aside>

      <section class="chat-pane" aria-label="问答区域">
        <header class="topbar">
          <div>
            <p class="eyebrow">本地代理已启用</p>
            <h2>开始提问</h2>
          </div>
          <div id="statusPill" class="status-pill">检查配置中</div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="composer">
          <textarea id="promptInput" rows="3" placeholder="输入你的问题..." required></textarea>
          <div class="composer-actions">
            <div id="usageInfo" class="usage-info"></div>
            <button id="sendButton" class="primary-button" type="submit">发送</button>
          </div>
        </form>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
